name: Set up
description: Install runtimes and dependencies.

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.14
    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
